<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />

  <link href='https://fonts.googleapis.com/css?family=Comfortaa' rel='stylesheet'>
  <style>/*HOW UGLY WILL THIS BE??? */
.text {
  font-family: 'Comfortaa';
  color:white;
  font-size: 125px;
  font-weight: bold;
  text-align: center;

  color: white;
}

  font-size: 50px;

}

}
button {
  font-family: 'Comfortaa';
  background-color: #0094ff;
  color: white;
  padding: 8px;

  height: 200px;
  outline: 10px solid yellow;

}

button:hover {

}
button.redirect {

input{
  font-family: 'Comfortaa';
  width:700px;
  height: 175px;
  background-color:yellow;
  color:black;
  outline: 15px solid orange;
  margin-bottom:25px;
}
.toggle-bar {
  position: absolute;
  top: calc(100% - 44px);
  right: 20px;
  background-color: #0099ff;
  padding: 10px;
  border-radius: 8px;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  user-select: none;
}

.toggle-button {
  background-color: #0094ff;
  color: white;
  border: none;
  padding: 8px 12px;
  font-size: 18px;
  border-radius: 4px;
  cursor: pointer;
  margin-bottom: 8px;
}

  display: flex;
  flex-direction: column;

  color: white;
}
#bookmarksContainer {
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  width: 300px;
  background-color: #003b5c;
  color: white;
  padding: 20px;
}

#bookmarksContainer h2 {
  margin-bottom: 15px;
  border-bottom: 2px solid #00bfff;
  padding-bottom: 5px;
}

.bookmark-link {
  color: #00bfff;
  text-decoration: none;
  display: block;

.bookmark-link:hover {
  background-color: #0073aa;
}</style>
</head>
<body>
  <div id="bookmarksContainer">
    <h2>Bookmarks</h2>
  </div>
  <div class="container">
    <div class="text">VSB Proxy</div>
    <input type="text" id="url" placeholder="insert link here"/>
    <button class="redirect" onclick="redirect()">Click Here :)</button>
    <button class="redirect bookmark" onclick="bookmark()">Bookmark Here:)</button>
  </div>
    <script>// parts from chatgpt might change later
function redirect() {
  const input = document.getElementById("url").value.trim();
  let finalUrl;

  if (isRealURL(input)) {
    finalUrl = input.startsWith("http") ? input : "https://" + input;
  } else {
    finalUrl = "https://www.google.com/search?q=" + encodeURIComponent(input);
  }

  // Add loading splash iframe
  const loadingFrame = document.createElement("iframe");
  loadingFrame.src = "loading.html";
  loadingFrame.style.position = "fixed";
  loadingFrame.style.top = 0;
  loadingFrame.style.left = 0;
  loadingFrame.style.width = "100%";
  loadingFrame.style.height = "100%";
  loadingFrame.style.border = "none";
  loadingFrame.style.zIndex = 9999;
  document.body.appendChild(loadingFrame);

  // Try to open in new tab
  const newTab = window.open("loading.html");

  setTimeout(() => {
    if (!newTab || newTab.closed || typeof newTab.closed === "undefined") {
      window.location.href = finalUrl;
    } else {
      newTab.location.href = finalUrl;
      setTimeout(() => {
        if (document.body.contains(loadingFrame)) {
          document.body.removeChild(loadingFrame);
        }
      }, 500);
    }
  }, 1000);
}

function isRealURL(str) {
  const pattern = /^(https?:\/\/)?([\w\d\-]+\.)+[\w]{2,}(\/.*)?$/i;
  return pattern.test(str);
}

// Bookmark a URL
function bookmark() {
  const input = document.getElementById("url").value.trim();
  let bookmarkedUrl;

  if (isRealURL(input)) {
    bookmarkedUrl = input.startsWith("http") ? input : "https://" + input;

    const bookmarks = JSON.parse(localStorage.getItem("bookmarks") || "[]");

    if (!bookmarks.includes(bookmarkedUrl)) {
      bookmarks.push(bookmarkedUrl);
      localStorage.setItem("bookmarks", JSON.stringify(bookmarks));
      alert("Bookmarked: " + bookmarkedUrl);
    } else {
      alert("Already bookmarked.");
    }

    showBookmarks();
  } else {
    alert("Please enter a valid URL to bookmark.");
  }
}

// Display bookmarks
function showBookmarks() {
  const container = document.getElementById("bookmarksContainer");
  container.innerHTML = "";

  const bookmarks = JSON.parse(localStorage.getItem("bookmarks") || "[]");

  if (bookmarks.length === 0) {
    container.innerHTML = "<p>No bookmarks yet.</p>";
    return;
  }

  bookmarks.forEach(url => {
    const link = document.createElement("a");
    link.href = url;
    link.textContent = url;
    link.target = "_blank";
    link.className = "bookmark-link";
    container.appendChild(link);
    container.appendChild(document.createElement("br"));
  });
}

// Load bookmarks on page load...
window.onload = () => {
  showBookmarks();
};</script>
</body>
</html>
